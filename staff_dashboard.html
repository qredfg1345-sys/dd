<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailStream Staff | Operations Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #0f172a; --blue: #1e40af; --accent: #3b82f6; --bg: #f8fafc; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.3; }

        /* Sidebar Navigation */
        .sidebar { width: 260px; background: var(--navy); color: white; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-menu { padding: 20px; flex-grow: 1; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; transition: 0.3s; color: #94a3b8; }
        .nav-item:hover, .nav-item.active { background: var(--blue); color: white; }
        .nav-label { font-size: 11px; text-transform: uppercase; color: #475569; margin: 20px 0 10px 10px; font-weight: bold; }

        /* Main Workspace */
        .main-wrapper { flex-grow: 1; position: relative; z-index: 10; display: flex; flex-direction: column; overflow-y: auto; }
        .top-bar { padding: 20px 40px; background: var(--white); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .content-body { padding: 40px; }

        /* Interface Elements */
        .glass-card { background: var(--white); border-radius: 16px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; display: none; }
        .glass-card.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; background: #fdfdfd; font-size: 14px; }
        .btn-staff { padding: 12px 25px; background: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .data-table th { background: #f8fafc; padding: 12px; text-align: left; font-size: 12px; color: #64748b; border-bottom: 2px solid #edf2f7; }
        .data-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0; font-size: 1.1rem;"><i class="fa-solid fa-train"></i> RailStream</h2>
        </div>
        <div class="nav-menu">
            <div class="nav-label">Passenger MGT</div>
            <div class="nav-item active" onclick="showTab('tab-passengers')"><i class="fa-solid fa-user-plus"></i> Registration</div>
            <div class="nav-item" onclick="showTab('tab-ticketing')"><i class="fa-solid fa-ticket"></i> Issue Ticket</div>
            
            <div class="nav-label">Operations</div>
            <div class="nav-item" onclick="showTab('tab-availability')"><i class="fa-solid fa-magnifying-glass-chart"></i> Availability</div>
            <div class="nav-item" onclick="showTab('tab-daily')"><i class="fa-solid fa-list-check"></i> Daily Schedule</div>
            
            <a href="index.html" class="nav-item" style="margin-top:50px; text-decoration:none; color:#f87171;"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <main class="main-wrapper">
        <div class="top-bar">
            <h3 id="current-title">Passenger Registration</h3>
            <div style="font-size: 13px; color: #64748b;"><i class="fa-solid fa-user-tag"></i> Staff Terminal</div>
        </div>

        <div class="content-body">
            
            <section id="tab-passengers" class="glass-card active">
                <h3>Passenger Profile Management</h3>
                <div class="form-grid">
                    <input type="text" id="pID" placeholder="National ID / Passport">
                    <input type="text" id="pName" placeholder="Full Name">
                    <button class="btn-staff" onclick="registerPassenger()">Save Profile</button>
                </div>
                <table class="data-table" id="passengerTable">
                    <thead><tr><th>ID</th><th>Name</th><th>Status</th></tr></thead>
                    <tbody></tbody>
                </table>
            </section>

            <section id="tab-ticketing" class="glass-card">
                <h3>Issue Ticket & Seat Allocation</h3>
                <div class="form-grid">
                    <input type="text" placeholder="Enter Passenger ID">
                    <select id="ticketTripList"><option>Select Trip (From Admin)</option></select>
                    <input type="text" placeholder="Seat No.">
                    <button class="btn-staff" onclick="alert('Ticket Issued successfully')">Issue Ticket</button>
                </div>
            </section>

            <section id="tab-daily" class="glass-card">
                <h3>Current Operational Schedule</h3>
                <table class="data-table" id="staffScheduleTable">
                    <thead><tr><th>Train</th><th>Departure</th><th>Route</th><th>Status</th></tr></thead>
                    <tbody></tbody>
                </table>
            </section>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        /* Particles configuration */
        particlesJS("particles-js", { "particles": { "number": { "value": 50 }, "size": { "value": 2 }, "color": { "value": "#cbd5e1" }, "line_linked": { "enable": true, "color": "#cbd5e1", "opacity": 0.3 }, "move": { "enable": true, "speed": 1 } } });

        /* Tab switching logic */
        function showTab(tabId) {
            document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('current-title').innerText = event.currentTarget.innerText;
            
            // Sync data from Admin when viewing schedule
            if(tabId === 'tab-daily') syncFromAdmin();
        }

        /* Real-time sync from Admin using localStorage */
        function syncFromAdmin() {
            const table = document.getElementById('staffScheduleTable').getElementsByTagName('tbody')[0];
            table.innerHTML = ""; 
            
            // Get schedules stored by Admin
            let adminData = JSON.parse(localStorage.getItem('masterSchedules')) || [];
            
            if(adminData.length === 0) {
                table.innerHTML = "<tr><td colspan='4'>No schedules published by Admin yet.</td></tr>";
                return;
            }

            adminData.forEach(trip => {
                let row = table.insertRow();
                row.innerHTML = `<td>${trip.train}</td><td>${trip.time}</td><td>${trip.route || 'Defined Route'}</td><td><span class="status-badge">Active</span></td>`;
            });
        }

        /* Passenger registration use case */
        function registerPassenger() {
            let id = document.getElementById('pID').value;
            let name = document.getElementById('pName').value;
            if(!id || !name) return alert("Please fill ID and Name");
            
            let table = document.getElementById('passengerTable').getElementsByTagName('tbody')[0];
            let row = table.insertRow();
            row.innerHTML = `<td>${id}</td><td>${name}</td><td><span class="status-badge">Verified</span></td>`;
        }
    </script>
</body>
</html>
