<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RailStream Staff | Operations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #0f172a; --blue: #1e40af; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: var(--bg); }
        .sidebar { width: 260px; background: var(--navy); color: white; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { background: var(--blue); color: white; }
        .main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 16px; display: none; }
        .card.active { display: block; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="padding:30px; text-align:center;"><h2>Staff Terminal</h2></div>
        <div class="nav-item active" onclick="showTab('tab-reg')"><i class="fa-solid fa-user-plus"></i> Registration [cite: 10]</div>
        <div class="nav-item" onclick="showTab('tab-ticket')"><i class="fa-solid fa-ticket"></i> Issue Ticket </div>
        <div class="nav-item" onclick="showTab('tab-view')"><i class="fa-solid fa-calendar-check"></i> Daily Schedule </div>
        <a href="index.html" style="color: #f87171; padding: 20px; text-decoration: none; margin-top: auto;"><i class="fa-solid fa-power-off"></i> Logout</a>
    </aside>

    <main class="main">
        <section id="tab-reg" class="card active">
            <h3>Passenger Registry</h3>
            <input type="text" id="pID" placeholder="National ID (Min 5 chars) ">
            <input type="text" id="pName" placeholder="Full Name">
            <button onclick="registerPassenger()" style="background:var(--blue); color:white; padding:10px; border-radius:8px;">Validate & Save [cite: 10, 13]</button>
        </section>

        <section id="tab-ticket" class="card">
            <h3>Seat Allocation & Booking</h3>
            <select id="tripSelect" onchange="checkAvailability()"><option value="">Check Availability </option></select>
            <div id="availabilityMsg" style="margin: 10px 0; font-weight: bold;"></div>
            <input type="text" id="seatNo" placeholder="Seat Number ">
            <button onclick="issueTicket()" style="background:var(--blue); color:white; padding:10px; border-radius:8px;">Generate Ticket </button>
        </section>

        <section id="tab-view" class="card">
            <h3>Current Operational Schedule </h3>
            <table width="100%" id="dailyTable"></table>
        </section>
    </main>

    <script>
        function showTab(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'tab-view') renderSchedule();
        }

        function registerPassenger() {
            let id = document.getElementById('pID').value;
            // Use Case: Validate Passenger ID 
            if(id.length < 5) return alert("System rejected: Invalid ID format [cite: 12]");
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            ps.push({ id, name: document.getElementById('pName').value });
            localStorage.setItem('passengers', JSON.stringify(ps));
            alert("Passenger Stored successfully [cite: 12]");
        }

        function renderSchedule() {
            // Retrieve trips for display 
            let scheds = JSON.parse(localStorage.getItem('masterSchedules')) || [];
            // Logic to display table...
        }
    </script>
</body>
</html>
