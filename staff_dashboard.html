<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RailStream Staff | Operations Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #0f172a; --blue: #1e40af; --bg: #f8fafc; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--navy); color: white; display: flex; flex-direction: column; }
        .nav-menu { padding: 20px; flex-grow: 1; }
        .nav-item { padding: 12px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: var(--blue); color: white; border-radius: 8px; }
        .main-wrapper { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .glass-card { background: var(--white); border-radius: 16px; padding: 25px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .glass-card.active { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .btn-staff { padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .badge { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="nav-menu">
            <div class="nav-item active" onclick="showTab('tab-reg')">Registration</div>
            <div class="nav-item" onclick="showTab('tab-ticket')">Issue Ticket</div>
            <div class="nav-item" onclick="showTab('tab-daily')">Daily Schedule</div>
            <a href="index.html" style="color:red; margin-top:20px; display:block;">Logout</a>
        </div>
    </aside>

    <main class="main-wrapper">
        <section id="tab-reg" class="glass-card active">
            <h3>Passenger Registration</h3>
            <div class="form-grid">
                <input type="text" id="pID" placeholder="National ID (Required)">
                <input type="text" id="pName" placeholder="Full Name">
                <button class="btn-staff" onclick="registerPassenger()">Save Profile</button>
            </div>
            <table class="data-table" id="passengerTable">
                <thead><tr><th>ID</th><th>Name</th><th>Status</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="tab-ticket" class="glass-card">
            <h3>Issue Ticket & Seat Allocation</h3>
            <div class="form-grid">
                <select id="pSelect"><option>Select Passenger</option></select>
                <select id="tSelect"><option>Select Trip</option></select>
                <input type="text" id="seatNo" placeholder="Seat (e.g. 12A)">
                <button class="btn-staff" onclick="issueTicket()">Confirm Booking</button>
            </div>
            <table class="data-table" id="ticketTable">
                <thead><tr><th>Ticket ID</th><th>Passenger</th><th>Seat</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="tab-daily" class="glass-card">
            <h3>Operational Schedule (From Admin)</h3>
            <table class="data-table" id="dailyTable">
                <thead><tr><th>Train</th><th>Route</th><th>Time</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <script>
        function showTab(id) {
            document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            syncData();
        }

        // Use Case: Validate ID & Create Profile
        function registerPassenger() {
            let id = document.getElementById('pID').value;
            if(!id) return alert("Validation Error: ID is mandatory!");
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            ps.push({ id, name: document.getElementById('pName').value });
            localStorage.setItem('passengers', JSON.stringify(ps));
            renderPassengers();
        }

        function renderPassengers() {
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            document.querySelector('#passengerTable tbody').innerHTML = ps.map(p => `<tr><td>${p.id}</td><td>${p.name}</td><td><span class="badge">Verified</span></td></tr>`).join('');
        }

        // Sync Data from Admin
        function syncData() {
            let schedules = JSON.parse(localStorage.getItem('masterSchedules')) || [];
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            
            document.getElementById('tSelect').innerHTML = schedules.map(s => `<option value="${s.train}">${s.train} - ${s.route}</option>`).join('');
            document.getElementById('pSelect').innerHTML = ps.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            
            document.querySelector('#dailyTable tbody').innerHTML = schedules.map(s => `<tr><td>${s.train}</td><td>${s.route}</td><td>${s.time}</td></tr>`).join('');
        }

        // Use Case: Issue Ticket & Seat Allocation
        function issueTicket() {
            let trip = document.getElementById('tSelect').value;
            let seat = document.getElementById('seatNo').value;
            let tickets = JSON.parse(localStorage.getItem('issuedTickets')) || [];

            // Check Availability
            if(tickets.find(t => t.trip === trip && t.seat === seat)) return alert("Seat already taken!");

            tickets.push({ id: 'TIC' + Date.now(), passenger: document.getElementById('pSelect').value, trip, seat });
            localStorage.setItem('issuedTickets', JSON.stringify(tickets));
            renderTickets();
        }

        function renderTickets() {
            let tickets = JSON.parse(localStorage.getItem('issuedTickets')) || [];
            document.querySelector('#ticketTable tbody').innerHTML = tickets.map((t, index) => 
                `<tr><td>${t.id}</td><td>${t.passenger}</td><td>${t.seat}</td><td><button style="color:red" onclick="cancelTicket(${index})">Cancel</button></td></tr>`).join('');
        }

        // Use Case: Cancel Ticket
        function cancelTicket(index) {
            let tickets = JSON.parse(localStorage.getItem('issuedTickets'));
            tickets.splice(index, 1);
            localStorage.setItem('issuedTickets', JSON.stringify(tickets));
            renderTickets();
        }

        window.onload = () => { renderPassengers(); renderTickets(); syncData(); };
    </script>
</body>
</html>
