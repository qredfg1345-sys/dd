<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RailStream | Staff Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Same visual style for consistency */
        :root { --navy: #0f172a; --blue: #1e40af; --accent: #3b82f6; --bg: #f8fafc; --white: #ffffff; --red: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--navy); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { background: var(--blue); color: white; }
        .btn-logout { background: var(--red); color: white; padding: 12px; margin: auto 20px 20px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; }
        .main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .glass-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: none; }
        .glass-card.active { display: block; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .btn-staff { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><h2>RailStream</h2></div>
        <div class="nav-item active" onclick="showTab('tab-reg')"><i class="fa-solid fa-user-plus"></i> Registration</div>
        <div class="nav-item" onclick="showTab('tab-book')"><i class="fa-solid fa-ticket"></i> Issue Ticket</div>
        <div class="nav-item" onclick="showTab('tab-view')"><i class="fa-solid fa-calendar-day"></i> View Schedule</div>
        <a href="index.html" class="btn-logout"><i class="fa-solid fa-power-off"></i> Logout</a>
    </aside>

    <main class="main">
        <section id="tab-reg" class="glass-card active">
            <h3>Passenger Registration</h3>
            <input type="text" id="pID" placeholder="National ID / Passport (Min 5 digits)">
            <input type="text" id="pName" placeholder="Full Name">
            <button class="btn-staff" onclick="registerPassenger()">Validate & Register</button>
            <table class="data-table" id="passTable">
                <thead><tr><th>ID</th><th>Name</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="tab-book" class="glass-card">
            <h3>Seat Allocation & Booking</h3>
            <select id="passSelect"><option value="">Select Passenger</option></select>
            <select id="tripSelect"><option value="">Select Trip</option></select>
            <button class="btn-staff" onclick="issueTicket()">Confirm Booking</button>
            <table class="data-table" id="ticketTable">
                <thead><tr><th>Passenger</th><th>Trip</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="tab-view" class="glass-card">
            <h3>Daily Operational Schedule</h3>
            <table class="data-table" id="dailyTable">
                <thead><tr><th>Train Asset</th><th>Departure Time</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <script>
        function showTab(id) {
            document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            syncStaff();
        }

        function registerPassenger() {
            let id = document.getElementById('pID').value;
            let name = document.getElementById('pName').value;
            if(id.length < 5) return alert("Validation Failed: ID too short!");
            
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            ps.push({ id, name });
            localStorage.setItem('passengers', JSON.stringify(ps));
            renderStaff();
        }

        function issueTicket() {
            let p = document.getElementById('passSelect').value;
            let t = document.getElementById('tripSelect').value;
            if(!p || !t) return alert("Select Passenger and Trip!");
            
            let b = JSON.parse(localStorage.getItem('tickets')) || [];
            b.push({ p, t });
            localStorage.setItem('tickets', JSON.stringify(b));
            renderStaff();
        }

        function deleteItem(key, i) {
            let data = JSON.parse(localStorage.getItem(key));
            data.splice(i, 1);
            localStorage.setItem(key, JSON.stringify(data));
            renderStaff();
        }

        function renderStaff() {
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            document.querySelector('#passTable tbody').innerHTML = ps.map((p, i) => `
                <tr><td>${p.id}</td><td>${p.name}</td><td><button onclick="deleteItem('passengers', ${i})" style="color:red; border:none; background:none; cursor:pointer;">Delete</button></td></tr>`).join('');

            let ts = JSON.parse(localStorage.getItem('tickets')) || [];
            document.querySelector('#ticketTable tbody').innerHTML = ts.map((t, i) => `
                <tr><td>${t.p}</td><td>${t.t}</td><td><button onclick="deleteItem('tickets', ${i})" style="color:red; border:none; background:none; cursor:pointer;">Cancel</button></td></tr>`).join('');
        }

        function syncStaff() {
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            let ss = JSON.parse(localStorage.getItem('schedules')) || [];
            document.getElementById('passSelect').innerHTML = ps.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            document.getElementById('tripSelect').innerHTML = ss.map(s => `<option value="${s.sTrain} at ${s.sTime}">${s.sTrain} - ${s.sTime}</option>`).join('');
            document.querySelector('#dailyTable tbody').innerHTML = ss.map(s => `<tr><td>${s.sTrain}</td><td>${s.sTime}</td></tr>`).join('');
        }

        window.onload = renderStaff;
    </script>
</body>
</html>
