<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RailStream Staff | Operations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #0f172a; --blue: #1e40af; --bg: #f8fafc; --red: #ef4444; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--navy); color: white; display: flex; flex-direction: column; }
        .nav-menu { padding: 20px; flex-grow: 1; }
        .nav-item { padding: 12px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: var(--blue); color: white; border-radius: 8px; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .glass-card { background: white; padding: 25px; border-radius: 16px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .glass-card.active { display: block; }
        .btn-staff { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-logout { background: var(--red); color: white; border: none; padding: 12px; margin: auto 20px 20px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table td, th { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="padding:30px; text-align:center;"><h2>RailStream</h2></div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="showTab('tab-reg')"><i class="fa-solid fa-user-plus"></i> Registration</div>
            <div class="nav-item" onclick="showTab('tab-ticket')"><i class="fa-solid fa-ticket"></i> Issue Ticket</div>
            <div class="nav-item" onclick="showTab('tab-daily')"><i class="fa-solid fa-calendar-day"></i> Daily Schedule</div>
        </div>
        <a href="index.html" class="btn-logout"><i class="fa-solid fa-power-off"></i> Logout</a>
    </aside>

    <main class="main-content">
        <section id="tab-reg" class="glass-card active">
            <h3>Passenger Registration</h3>
            <input type="text" id="pID" placeholder="National ID (Min 5 chars)">
            <input type="text" id="pName" placeholder="Full Name">
            <button class="btn-staff" onclick="registerPassenger()">Validate & Register</button>
            <table class="data-table" id="passTable">
                <thead><tr><th>ID</th><th>Name</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="tab-ticket" class="glass-card">
            <h3>Seat Allocation</h3>
            <select id="pSelect"><option value="">Select Passenger</option></select>
            <select id="tSelect"><option value="">Select Trip</option></select>
            <input type="text" id="seatNo" placeholder="Seat Number">
            <button class="btn-staff" onclick="issueTicket()">Confirm Booking</button>
            <table class="data-table" id="ticketTable">
                <thead><tr><th>Passenger</th><th>Seat</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="tab-daily" class="glass-card">
            <h3>Operational Schedule (Synced)</h3>
            <table class="data-table" id="dailyTable">
                <thead><tr><th>Train</th><th>Time</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <script>
        function showTab(id) {
            document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            syncData();
        }

        // Use Case: Validate Passenger ID [cite: 13]
        function registerPassenger() {
            let id = document.getElementById('pID').value;
            if(id.length < 5) return alert("ID Reject: Invalid format");
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            ps.push({ id, name: document.getElementById('pName').value });
            localStorage.setItem('passengers', JSON.stringify(ps));
            renderPassengers();
        }

        function renderPassengers() {
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            document.querySelector('#passTable tbody').innerHTML = ps.map(p => `<tr><td>${p.id}</td><td>${p.name}</td></tr>`).join('');
        }

        // Use Case: Seat Allocation & Check Availability [cite: 14, 15]
        function issueTicket() {
            let p = document.getElementById('pSelect').value;
            let t = document.getElementById('tSelect').value;
            let s = document.getElementById('seatNo').value;
            let tickets = JSON.parse(localStorage.getItem('tickets')) || [];
            if(tickets.find(tk => tk.t === t && tk.s === s)) return alert("Seat occupied!");
            tickets.push({ p, t, s });
            localStorage.setItem('tickets', JSON.stringify(tickets));
            renderTickets();
        }

        function renderTickets() {
            let ts = JSON.parse(localStorage.getItem('tickets')) || [];
            document.querySelector('#ticketTable tbody').innerHTML = ts.map((t, i) => `<tr><td>${t.p}</td><td>${t.s}</td><td><button onclick="cancelTicket(${i})" style="color:red; border:none; background:none; cursor:pointer;">Cancel</button></td></tr>`).join('');
        }

        // Use Case: Cancel Ticket [cite: 28]
        function cancelTicket(i) {
            let ts = JSON.parse(localStorage.getItem('tickets'));
            ts.splice(i, 1);
            localStorage.setItem('tickets', JSON.stringify(ts));
            renderTickets();
        }

        function syncData() {
            let ps = JSON.parse(localStorage.getItem('passengers')) || [];
            let ss = JSON.parse(localStorage.getItem('masterSchedules')) || [];
            document.getElementById('pSelect').innerHTML = ps.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            document.getElementById('tSelect').innerHTML = ss.map(s => `<option value="${s.train}">${s.train} - ${s.time}</option>`).join('');
            document.querySelector('#dailyTable tbody').innerHTML = ss.map(s => `<tr><td>${s.train}</td><td>${s.time}</td></tr>`).join('');
        }

        window.onload = () => { renderPassengers(); renderTickets(); syncData(); };
    </script>
</body>
</html>
