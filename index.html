<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailRoute Central | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy-primary: #0f172a; /* كحلي غامق رسمي */
            --blue-accent: #2563eb;  /* أزرق إداري */
            --bg-white: #ffffff;
            --text-gray: #64748b;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-white);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* تنسيق الشبكة العنكبوتية التقنية في الخلفية */
        .tech-mesh {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(15, 23, 42, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        /* الدوائر الشبكية في الزوايا (Spider Web Effect) */
        .web-corner {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.05) 0%, transparent 70%);
            border: 1px solid rgba(37, 99, 235, 0.1);
            border-radius: 50%;
            z-index: 0;
        }
        .top-left { top: -200px; left: -200px; }
        .bottom-right { bottom: -200px; right: -200px; }

        .login-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(15, 23, 42, 0.05);
            text-align: center;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        /* أيقونة النظام المقترحة (مسار قطار مدمج بتقنية) */
        .system-logo {
            font-size: 40px;
            color: var(--navy-primary);
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            font-size: 20px;
            color: var(--navy-primary);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .system-desc {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 40px;
            margin-top: 5px;
        }

        .input-wrapper {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--navy-primary);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
            color: var(--navy-primary);
        }

        input:focus, select:focus {
            border-color: var(--blue-accent);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
        }

        .btn-access {
            width: 100%;
            padding: 16px;
            background: var(--navy-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-access:hover {
            background: var(--blue-accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

    </style>
</head>
<body>

    <div class="tech-mesh"></div>
    <div class="web-corner top-left"></div>
    <div class="web-corner bottom-right"></div>

    <div class="login-container">
        <div class="system-logo">
            <i class="fa-solid fa-train-subway"></i>
        </div>
        
        <h1>RailRoute Central</h1>
        <p class="system-desc">Train Schedule & Reservation System</p>

        <div class="input-wrapper">
            <label>Personnel Role</label>
            <select id="userRole">
                <option value="admin">System Administrator (Admin)</option>
                <option value="staff">Operational Controller (Staff)</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Access Identifier</label>
            <input type="text" id="userID" placeholder="Enter Employee ID">
        </div>

        <div class="input-wrapper">
            <label>Security Key</label>
            <input type="password" id="userKey" placeholder="••••••••">
        </div>

        <button class="btn-access" onclick="processLogin()">
            Validate & Authorize
        </button>
    </div>

    <script>
        function processLogin() {
            const id = document.getElementById('userID').value;
            const key = document.getElementById('userKey').value;
            const role = document.getElementById('userRole').value;

            // التحقق بناءً على الأدوار المطلوبة في البروجكت
            if ((id === 'admin' && key === 'admin' && role === 'admin') || 
                (id === 'staff' && key === 'staff' && role === 'staff')) {
                alert("Authorization Granted. Accessing " + role.toUpperCase() + " Dashboard...");
            } else {
                alert("Access Denied: Please check your credentials.");
            }
        }
    </script>
</body>
</html>
