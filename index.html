<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RailRoute Central | Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tech-web-canvas"></div>
    <div class="web-nodes"></div>

    <div class="login-card">
        <div class="brand-logo">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <h1 style="font-size: 20px; margin: 0; letter-spacing: 1px;">RAILROUTE CENTRAL</h1>
        <p style="color: #64748b; font-size: 12px; margin: 8px 0 35px;">Infrastructure & Reservation Governance</p>

        <form onsubmit="return false">
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="font-size: 11px; font-weight: 800; color: #0f172a; text-transform: uppercase;">Operations Domain</label>
                <select id="role" style="width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid #e2e8f0; margin-top: 8px;">
                    <option value="admin">Infrastructure Administrator (Admin)</option>
                    <option value="staff">Station Operational Staff (Staff)</option>
                </select>
            </div>

            <div style="text-align: left; margin-bottom: 20px;">
                <label style="font-size: 11px; font-weight: 800; color: #0f172a; text-transform: uppercase;">Authentication Identifier</label>
                <input type="text" placeholder="Enter ID or Username" style="width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid #e2e8f0; margin-top: 8px; box-sizing: border-box;">
            </div>

            <div style="text-align: left; margin-bottom: 30px;">
                <label style="font-size: 11px; font-weight: 800; color: #0f172a; text-transform: uppercase;">Secure Key</label>
                <input type="password" placeholder="••••••••" style="width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid #e2e8f0; margin-top: 8px; box-sizing: border-box;">
            </div>

            <button class="btn-primary">Authorize Access</button>
        </form>
    </div>

</body>
</html>
