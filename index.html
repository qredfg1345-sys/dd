<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Governance | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-navy: #0f172a;
            --electric-blue: #3b82f6;
            --slate-gray: #64748b;
            --soft-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--soft-white);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* تأثير الشبكة العنكبوتية التقنية في الخلفية */
        .network-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(59, 130, 246, 0.15) 1px, transparent 0);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* خطوط الشبكة المتقاطعة في الزوايا */
        .web-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(15, 23, 42, 0.02) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(15, 23, 42, 0.02) 50%, transparent 52%);
            background-size: 60px 60px;
            z-index: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 45px;
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.15);
            border: 1px solid rgba(15, 23, 42, 0.05);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        /* أيقونة احترافية أنيقة */
        .brand-icon {
            font-size: 45px;
            background: linear-gradient(135deg, var(--primary-navy), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            display: inline-block;
        }

        h2 {
            color: var(--primary-navy);
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--slate-gray);
            font-size: 14px;
            margin-top: 10px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-navy);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 14px;
            background: #f8fafc;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
            color: var(--primary-navy);
        }

        input:focus, select:focus {
            background: white;
            border-color: var(--electric-blue);
            box-shadow: 0 0 0 5px rgba(59, 130, 246, 0.1);
        }

        .btn-authorize {
            width: 100%;
            padding: 18px;
            background: var(--primary-navy);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.3);
        }

        .btn-authorize:hover {
            background: var(--electric-blue);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.4);
        }

        /* زينة الزوايا - شكل الشبكة المتطورة */
        .corner-decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            z-index: 1;
        }
        .top-left { top: 0; left: 0; border-left: 2px solid var(--electric-blue); border-top: 2px solid var(--electric-blue); border-radius: 50px 0 0 0; opacity: 0.1; }
        .bottom-right { bottom: 0; right: 0; border-right: 2px solid var(--electric-blue); border-bottom: 2px solid var(--electric-blue); border-radius: 0 0 50px 0; opacity: 0.1; }

    </style>
</head>
<body>

    <div class="network-bg"></div>
    <div class="web-lines"></div>
    
    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration bottom-right"></div>

    <div class="login-card">
        <div class="brand-icon">
            <i class="fa-solid fa-tower-broadcast"></i>
        </div>
        
        <h2>RAILWAY GOVERNANCE</h2>
        <p class="subtitle">Enterprise Resource Control Management</p>

        <div class="input-group">
            <label>Department</label>
            <select id="role">
                <option value="admin">Operations Administrator</option>
                <option value="staff">Station Operational Staff</option>
            </select>
        </div>

        <div class="input-group">
            <label>System Access Key</label>
            <input type="text" id="user" placeholder="Enter Access ID">
        </div>

        <div class="input-group">
            <label>Security Token</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <button class="btn-authorize" onclick="attemptLogin()">
            Validate & Authenticate
        </button>
    </div>

    <script>
        function attemptLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const r = document.getElementById('role').value;

            if ((u === 'admin' && p === 'admin' && r === 'admin') || 
                (u === 'staff' && p === 'staff' && r === 'staff')) {
                alert("Identity Verified. Syncing with Central Governance...");
                // سيتم توجيهك للوحة التحكم في الكود التالي
            } else {
                alert("Security Alert: Invalid credentials provided.");
            }
        }
    </script>
</body>
</html>
