<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailRoute Central | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy-deep: #0f172a;
            --blue-royal: #1e40af;
            --blue-tech: #3b82f6;
            --white-pure: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--white-pure);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* تصميم الشبكة العنكبوتية التقنية في الخلفية */
        .spider-web-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(30, 64, 175, 0.1) 1px, transparent 0),
                linear-gradient(45deg, rgba(30, 64, 175, 0.02) 25%, transparent 25%, transparent 75%, rgba(30, 64, 175, 0.02) 75%, rgba(30, 64, 175, 0.02)),
                linear-gradient(-45deg, rgba(30, 64, 175, 0.02) 25%, transparent 25%, transparent 75%, rgba(30, 64, 175, 0.02) 75%, rgba(30, 64, 175, 0.02));
            background-size: 40px 40px, 80px 80px, 80px 80px;
        }

        /* خطوط الشبكة في الزوايا */
        .corner-mesh {
            position: absolute;
            width: 500px; height: 500px;
            background: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(59, 130, 246, 0.05) 35px, rgba(59, 130, 246, 0.05) 36px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(59, 130, 246, 0.05) 35px, rgba(59, 130, 246, 0.05) 36px);
            z-index: 1;
        }
        .mesh-tl { top: -150px; left: -150px; }
        .mesh-br { bottom: -150px; right: -150px; }

        /* حاوية تسجيل الدخول */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 55px 45px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(30, 64, 175, 0.1);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(8px);
        }

        /* الأيقونة التقنية */
        .icon-box {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--navy-deep), var(--blue-royal));
            color: white; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 25px;
            box-shadow: 0 12px 24px rgba(30, 64, 175, 0.2);
        }

        h1 {
            color: var(--navy-deep); font-size: 22px;
            font-weight: 800; margin: 0;
            text-transform: uppercase; letter-spacing: 1.5px;
        }

        .subtitle {
            color: #64748b; font-size: 13px; margin: 8px 0 35px;
        }

        .input-group { text-align: left; margin-bottom: 22px; }

        label {
            display: block; font-size: 11px; font-weight: 700;
            color: var(--navy-deep); text-transform: uppercase;
            margin-bottom: 8px; letter-spacing: 0.8px;
        }

        input, select {
            width: 100%; padding: 15px 18px;
            border: 2px solid #f1f5f9; border-radius: 12px;
            font-size: 14px; outline: none; background: #fafafa;
            transition: 0.3s ease; color: var(--navy-deep);
        }

        input:focus, select:focus {
            border-color: var(--blue-royal);
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        /* الزر بتدرج الأزرق والكحلي */
        .btn-authorize {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, var(--navy-deep) 0%, var(--blue-royal) 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 14px; font-weight: 700;
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s;
            margin-top: 10px;
        }

        .btn-authorize:hover {
            background: linear-gradient(135deg, var(--blue-royal) 0%, var(--blue-tech) 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 64, 175, 0.25);
        }

    </style>
</head>
<body>

    <div class="spider-web-bg"></div>
    <div class="corner-mesh mesh-tl"></div>
    <div class="corner-mesh mesh-br"></div>

    <div class="login-card">
        <div class="icon-box">
            <i class="fa-solid fa-tower-observation"></i>
        </div>
        
        <h1>RailRoute Central</h1>
        <p class="subtitle">Secure Operational Management System</p>

        <div class="input-group">
            <label>Access Level</label>
            <select id="role">
                <option value="admin">Administrator (Admin)</option>
                <option value="staff">Operations Staff (Staff)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Authentication</label>
            <input type="text" id="user" placeholder="Enter ID or Username">
        </div>

        <div class="input-group">
            <label>Security Key</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <button class="btn-authorize" onclick="attemptLogin()">
            Authenticate Access
        </button>
    </div>

    <script>
        function attemptLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u && p) {
                alert("Verifying identity... Please wait.");
            } else {
                alert("Credentials required.");
            }
        }
    </script>
</body>
</html>
