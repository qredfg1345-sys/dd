<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailRoute Central | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy-deep: #0f172a;    /* كحلي غامق جداً للنصوص والأزرار */
            --blue-royal: #1e40af;   /* أزرق ملكي للتأثيرات */
            --blue-light: #3b82f6;   /* أزرق تقني للخطوط */
            --bg-pure-white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-pure-white);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* تأثير الشبكة العنكبوتية التقنية (Technical Web Lines) */
        .tech-web-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* رسم الخطوط المتشابكة في الزوايا كما في الصورة */
        .web-lines {
            position: absolute;
            width: 500px;
            height: 500px;
            opacity: 0.15;
        }
        
        /* الشبكة في الزاوية العلوية اليسرى */
        .top-left-web {
            top: -100px; left: -100px;
            background-image: 
                radial-gradient(circle at 2px 2px, var(--blue-royal) 1px, transparent 0);
            background-size: 30px 30px;
            mask-image: radial-gradient(ellipse at top left, black, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at top left, black, transparent 70%);
        }

        /* خطوط عنكبوتية هندسية مائلة */
        .diagonal-web {
            position: absolute;
            width: 100%; height: 100%;
            background: 
                linear-gradient(217deg, rgba(30, 64, 175, 0.05), rgba(255,0,0,0) 70.71%),
                linear-gradient(127deg, rgba(15, 23, 42, 0.05), rgba(0,255,0,0) 70.71%);
        }

        /* كرت تسجيل الدخول */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 60px 45px;
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.1);
            border: 1px solid rgba(15, 23, 42, 0.05);
            position: relative;
            z-index: 10;
        }

        /* أيقونة المسارات والتحكم */
        .brand-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--navy-deep), var(--blue-royal));
            color: white;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(30, 64, 175, 0.2);
        }

        h1 {
            color: var(--navy-deep);
            font-size: 22px;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tagline {
            color: #64748b;
            font-size: 13px;
            margin: 10px 0 40px;
            font-weight: 500;
        }

        /* حقول الإدخال */
        .field-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--navy-deep);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
            background: #fafafa;
        }

        input:focus, select:focus {
            background: white;
            border-color: var(--blue-royal);
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.08);
        }

        /* زر الدخول */
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--navy-deep);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--blue-royal);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(30, 64, 175, 0.2);
        }

        /* أيقونة الشبكة في الزاوية اليمنى السفلية */
        .bottom-right-web {
            position: absolute;
            bottom: -50px; right: -50px;
            width: 300px; height: 300px;
            border: 1px solid rgba(30, 64, 175, 0.1);
            border-radius: 50%;
            opacity: 0.5;
        }

    </style>
</head>
<body>

    <div class="tech-web-container">
        <div class="web-lines top-left-web"></div>
        <div class="diagonal-web"></div>
        <div class="bottom-right-web"></div>
    </div>

    <div class="login-card">
        <div class="brand-icon">
            <i class="fa-solid fa-route"></i>
        </div>
        
        <h1>RailRoute Central</h1>
        <p class="tagline">Infrastructure & Reservation Governance</p>

        <div class="field-group">
            <label>Access Role</label>
            <select id="role">
                <option value="admin">Infrastructure Administrator (Admin)</option>
                <option value="staff">Operations Controller (Staff)</option>
            </select>
        </div>

        <div class="field-group">
            <label>Personnel Identifier</label>
            <input type="text" id="user" placeholder="Enter employee ID">
        </div>

        <div class="field-group">
            <label>Secure Token</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <button class="btn-submit" onclick="validateAuth()">
            Authenticate & Access
        </button>
    </div>

    <script>
        function validateAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const r = document.getElementById('role').value;

            if ((u === 'admin' && p === 'admin' && r === 'admin') || 
                (u === 'staff' && p === 'staff' && r === 'staff')) {
                alert("Identity Verified. Accessing " + r.toUpperCase() + " Terminal...");
            } else {
                alert("Security Alert: Invalid credentials provided.");
            }
        }
    </script>
</body>
</html>
