<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROM | Secure Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy-dark: #0f172a;
            --blue-main: #1e40af;
            --blue-light: #3b82f6;
            --slate-gray: #64748b;
            --bg-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* لمسة الشبكة العنكبوتية التقنية في الزوايا */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background-image: radial-gradient(var(--blue-light) 0.5px, transparent 0.5px);
            background-size: 15px 15px;
            opacity: 0.2;
            z-index: 0;
        }
        body::before { top: -50px; left: -50px; border-radius: 50%; border: 1px solid var(--blue-main); }
        body::after { bottom: -50px; right: -50px; border-radius: 50%; border: 1px solid var(--blue-main); }

        /* حاوية تسجيل الدخول */
        .login-card {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.1);
            border: 1px solid #f1f5f9;
            position: relative;
            z-index: 1;
        }

        /* أيقونة الدرع التقني المتطورة */
        .icon-header {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--navy-dark), var(--blue-main));
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 25px;
            box-shadow: 0 8px 15px rgba(30, 64, 175, 0.3);
        }

        h2 {
            color: var(--navy-dark);
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p.subtitle {
            color: var(--slate-gray);
            font-size: 14px;
            margin: 8px 0 35px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--navy-dark);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
            color: var(--navy-dark);
        }

        select:focus, input:focus {
            border-color: var(--blue-main);
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.05);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, var(--navy-dark), var(--blue-main));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(15, 23, 42, 0.2);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* تأثير إضافي للشبكة في الخلفية */
        .corner-grid {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 1px solid rgba(30, 64, 175, 0.1);
            transform: rotate(45deg);
            z-index: 0;
        }
        .top-right { top: -75px; right: -75px; }
        .bottom-left { bottom: -75px; left: -75px; }

    </style>
</head>
<body>

    <div class="corner-grid top-right"></div>
    <div class="corner-grid bottom-left"></div>

    <div class="login-card">
        <div class="icon-header">
            <i class="fa-solid fa-shield-network"></i>
        </div>
        
        <h2>GROM AUTHENTICATION</h2>
        <p class="subtitle">Global Rail Operations Management</p>

        <div class="form-group">
            <label>Department Access</label>
            <select id="role-select">
                <option value="admin">Operations Administrator (Admin)</option>
                <option value="staff">Station Operational Staff (Staff)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Credentials ID</label>
            <input type="text" id="user" placeholder="Enter your ID">
        </div>

        <div class="form-group">
            <label>Security Token</label>
            <input type="password" id="pass" placeholder="Enter Password">
        </div>

        <button class="btn-login" onclick="handleLogin()">
            Authorize Session
        </button>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const role = document.getElementById('role-select').value;

            // كود التحقق البدئي (Alternative Flow) [cite: 2]
            if ((user === 'admin' && pass === 'admin' && role === 'admin') || 
                (user === 'staff' && pass === 'staff' && role === 'staff')) {
                alert("Authorization Successful. Redirecting to Portal...");
                // هنا سيتم الربط مع الكود القادم للوحة التحكم
            } else {
                alert("Alternative Flow: Invalid Credentials. Please try again.");
            }
        }
    </script>
</body>
</html>
