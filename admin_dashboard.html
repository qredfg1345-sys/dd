<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailStream Admin | System Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0f172a; --blue: #1e40af; --accent: #3b82f6; --bg: #f8fafc; --white: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--navy); color: white; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--blue); color: white; }

        /* Main Content */
        .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .content-body { padding: 40px; }
        .glass-card { background: var(--white); border-radius: 16px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; display: none; }
        .glass-card.active { display: block; }

        /* Table & In-line Editing */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .edit-input { padding: 5px; border: 1px solid var(--accent); border-radius: 4px; width: 80%; }
        
        /* Professional Reports UI */
        .report-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; border-top: 4px solid var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .stat-val { font-size: 28px; font-weight: bold; color: var(--navy); margin: 10px 0; }
        .stat-label { color: #64748b; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* Buttons */
        .btn { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-save { background: var(--navy); color: white; }
        .btn-update { background: #e0f2fe; color: var(--blue); margin-right: 5px; }
        .btn-delete { background: #fee2e2; color: #ef4444; }
        .btn-cancel { background: #f1f5f9; color: #64748b; margin-left: 5px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="padding: 30px; font-weight: bold; font-size: 20px; color: var(--accent);">RailStream Admin</div>
        <div class="nav-item active" onclick="showTab('tab-trains')"><i class="fa-solid fa-train"></i> Fleet Management</div>
        <div class="nav-item" onclick="showTab('tab-reports')"><i class="fa-solid fa-chart-pie"></i> Operational Reports</div>
        <a href="index.html" class="nav-item" style="margin-top: auto; color: #ef4444;"><i class="fa-solid fa-power-off"></i> Logout</a>
    </aside>

    <main class="main-wrapper">
        <div class="content-body">
            
            <section id="tab-trains" class="glass-card active">
                <h3>Train Assets Management</h3>
                <table class="data-table" id="trainTable">
                    <thead><tr><th>Train ID</th><th>Model</th><th>Actions</th></tr></thead>
                    <tbody>
                        <tr id="row-1">
                            <td class="id-cell">EX-79</td>
                            <td class="model-cell">Local Express</td>
                            <td class="action-cell">
                                <button class="btn btn-update" onclick="enableEdit('row-1')">Update</button>
                                <button class="btn btn-delete" onclick="this.closest('tr').remove()">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section id="tab-reports" class="glass-card">
                <h3>Operational Intelligence</h3>
                <div class="report-grid">
                    <div class="stat-card">
                        <i class="fa-solid fa-train-subway fa-2x" style="color: var(--blue);"></i>
                        <div class="stat-val">14</div>
                        <div class="stat-label">Total Fleet</div>
                    </div>
                    <div class="stat-card">
                        <i class="fa-solid fa-route fa-2x" style="color: #10b981;"></i>
                        <div class="stat-val">8</div>
                        <div class="stat-label">Active Routes</div>
                    </div>
                    <div class="stat-card">
                        <i class="fa-solid fa-ticket fa-2x" style="color: #f59e0b;"></i>
                        <div class="stat-val">1,250</div>
                        <div class="stat-label">Daily Reservations</div>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        // Tab switching function
        function showTab(id) {
            document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- In-line Editing Logic ---
        function enableEdit(rowId) {
            const row = document.getElementById(rowId);
            const modelCell = row.querySelector('.model-cell');
            const actionCell = row.querySelector('.action-cell');
            const originalValue = modelCell.innerText;

            // Replace text with Input field
            modelCell.innerHTML = `<input type="text" class="edit-input" value="${originalValue}">`;

            // Change buttons to (Save / Cancel)
            actionCell.innerHTML = `
                <button class="btn btn-save" onclick="saveEdit('${rowId}', '${originalValue}')">Save</button>
                <button class="btn btn-cancel" onclick="cancelEdit('${rowId}', '${originalValue}')">Cancel</button>
            `;
        }

        function saveEdit(rowId, oldValue) {
            const row = document.getElementById(rowId);
            const newValue = row.querySelector('.edit-input').value;
            finishEditing(row, newValue);
        }

        function cancelEdit(rowId, oldValue) {
            const row = document.getElementById(rowId);
            finishEditing(row, oldValue); // Revert to the old value on cancel
        }

        function finishEditing(row, value) {
            row.querySelector('.model-cell').innerText = value;
            row.querySelector('.action-cell').innerHTML = `
                <button class="btn btn-update" onclick="enableEdit('${row.id}')">Update</button>
                <button class="btn btn-delete" onclick="this.closest('tr').remove()">Delete</button>
            `;
        }
    </script>
</body>
</html>
