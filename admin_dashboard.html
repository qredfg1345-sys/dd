<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RailStream | Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #0f172a; --blue: #1e40af; --accent: #3b82f6; --bg: #f8fafc; --white: #ffffff; --red: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--navy); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--blue); color: white; }
        .btn-logout { background: var(--red); color: white; padding: 12px; margin: auto 20px 20px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; }

        /* Content */
        .main { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .glass-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: none; }
        .glass-card.active { display: block; }
        
        /* Table Styles */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .edit-input { padding: 8px; border: 1px solid var(--accent); border-radius: 4px; width: 80%; }
        
        /* Reports Grid */
        .report-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; border-top: 4px solid var(--blue); text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-val { font-size: 28px; font-weight: bold; color: var(--navy); margin-top: 10px; }

        .btn-action { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-save { background: var(--navy); color: white; }
        .btn-cancel { background: #f1f5f9; color: #64748b; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-right: 10px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><h2>RailStream</h2></div>
        <div class="nav-item active" onclick="showTab('tab-trains')"><i class="fa-solid fa-train"></i> Trains</div>
        <div class="nav-item" onclick="showTab('tab-schedules')"><i class="fa-solid fa-calendar"></i> Schedules</div>
        <div class="nav-item" onclick="showTab('tab-reports'); updateReports();"><i class="fa-solid fa-chart-line"></i> Reports</div>
        <a href="index.html" class="btn-logout"><i class="fa-solid fa-power-off"></i> Logout</a>
    </aside>

    <main class="main">
        <section id="tab-trains" class="glass-card active">
            <h3>Fleet Management</h3>
            <div style="margin-bottom: 20px;">
                <input type="text" id="tID" placeholder="Train ID">
                <input type="text" id="tModel" placeholder="Model">
                <button onclick="addItem('trains', ['tID', 'tModel'])" class="btn-action btn-save">Add Train</button>
            </div>
            <table class="data-table" id="trainTable">
                <thead><tr><th>ID</th><th>Model</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="tab-schedules" class="glass-card">
            <h3>Master Schedule</h3>
            <div style="margin-bottom: 20px;">
                <select id="sTrain"><option value="">Select Train</option></select>
                <input type="datetime-local" id="sTime">
                <button onclick="addSchedule()" class="btn-action btn-save">Create Schedule</button>
            </div>
            <table class="data-table" id="scheduleTable">
                <thead><tr><th>Train</th><th>Time</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="tab-reports" class="glass-card">
            <h3>System Reports</h3>
            <div class="report-grid" id="reportContent"></div>
        </section>
    </main>

    <script>
        function showTab(id) {
            document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'tab-schedules') syncSelect();
        }

        // Add Data
        function addItem(key, ids) {
            let data = JSON.parse(localStorage.getItem(key)) || [];
            let obj = {};
            ids.forEach(id => { obj[id] = document.getElementById(id).value; document.getElementById(id).value = ''; });
            if(!Object.values(obj)[0]) return alert("Fill fields!");
            data.push(obj);
            localStorage.setItem(key, JSON.stringify(data));
            renderAll();
        }

        // Add Schedule with Conflict Check
        function addSchedule() {
            let train = document.getElementById('sTrain').value;
            let time = document.getElementById('sTime').value;
            if(!train || !time) return alert("Select Train/Time");
            
            let scheds = JSON.parse(localStorage.getItem('schedules')) || [];
            if(scheds.find(s => s.sTrain === train && s.sTime === time)) return alert("Conflict: Train is busy!");
            
            scheds.push({ sTrain: train, sTime: time });
            localStorage.setItem('schedules', JSON.stringify(scheds));
            renderAll();
        }

        // In-place Editing Logic
        function enableEdit(rowId, key, index) {
            const row = document.getElementById(rowId);
            const cells = row.querySelectorAll('td');
            const oldValue = cells[1].innerText;
            
            cells[1].innerHTML = `<input type="text" class="edit-input" value="${oldValue}">`;
            cells[2].innerHTML = `
                <button class="btn-action btn-save" onclick="saveEdit('${rowId}', '${key}', ${index})">Save</button>
                <button class="btn-action btn-cancel" onclick="renderAll()">Cancel</button>
            `;
        }

        function saveEdit(rowId, key, index) {
            let data = JSON.parse(localStorage.getItem(key));
            const row = document.getElementById(rowId);
            const newValue = row.querySelector('.edit-input').value;
            const keys = Object.keys(data[index]);
            data[index][keys[1]] = newValue;
            localStorage.setItem(key, JSON.stringify(data));
            renderAll();
        }

        function deleteItem(key, index) {
            let data = JSON.parse(localStorage.getItem(key));
            data.splice(index, 1);
            localStorage.setItem(key, JSON.stringify(data));
            renderAll();
        }

        function renderAll() {
            // Render Trains
            let trains = JSON.parse(localStorage.getItem('trains')) || [];
            document.querySelector('#trainTable tbody').innerHTML = trains.map((t, i) => `
                <tr id="t-row-${i}"><td>${t.tID}</td><td>${t.tModel}</td>
                <td><button class="btn-action" onclick="enableEdit('t-row-${i}', 'trains', ${i})">Update</button>
                <button class="btn-action" style="color:red" onclick="deleteItem('trains', ${i})">Delete</button></td></tr>`).join('');

            // Render Schedules
            let scheds = JSON.parse(localStorage.getItem('schedules')) || [];
            document.querySelector('#scheduleTable tbody').innerHTML = scheds.map((s, i) => `
                <tr id="s-row-${i}"><td>${s.sTrain}</td><td>${s.sTime}</td>
                <td><button class="btn-action" style="color:red" onclick="deleteItem('schedules', ${i})">Delete</button></td></tr>`).join('');
        }

        function syncSelect() {
            let trains = JSON.parse(localStorage.getItem('trains')) || [];
            document.getElementById('sTrain').innerHTML = trains.map(t => `<option value="${t.tID}">${t.tID}</option>`).join('');
        }

        function updateReports() {
            let t = JSON.parse(localStorage.getItem('trains')) || [];
            let s = JSON.parse(localStorage.getItem('schedules')) || [];
            let b = JSON.parse(localStorage.getItem('tickets')) || [];
            document.getElementById('reportContent').innerHTML = `
                <div class="stat-card"><i class="fa-solid fa-train"></i><div class="stat-val">${t.length}</div><div>Total Trains</div></div>
                <div class="stat-card"><i class="fa-solid fa-calendar-check"></i><div class="stat-val">${s.length}</div><div>Total Trips</div></div>
                <div class="stat-card"><i class="fa-solid fa-ticket"></i><div class="stat-val">${b.length}</div><div>Tickets Issued</div></div>`;
        }

        window.onload = renderAll;
    </script>
</body>
</html>
