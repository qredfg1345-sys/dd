<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailRoute Admin | Infrastructure Governance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modern Admin Layout */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .admin-wrapper { display: flex; height: 100vh; position: relative; z-index: 10; }
        
        /* Sidebar Styling */
        .sidebar { width: 260px; background: #0f172a; color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .sidebar h2 { color: #3b82f6; font-size: 20px; margin-bottom: 40px; }
        .nav-link { color: #cbd5e1; text-decoration: none; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #1e40af; color: white; }
        
        /* Main Workspace */
        .main-content { flex: 1; padding: 40px; background: rgba(248, 250, 252, 0.9); overflow-y: auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Interactive Cards */
        .glass-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        /* Form & Table */
        .form-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; margin-bottom: 30px; }
        input { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none; text-align: left !important; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 15px; background: #f1f5f9; color: #0f172a; font-size: 13px; }
        .data-table td { padding: 15px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        
        /* Stats Grid */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #e2e8f0; }
        
        .btn-del { background: #fee2e2; color: #b91c1c; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="admin-wrapper">
        <aside class="sidebar">
            <h2><i class="fa-solid fa-train-subway"></i> RailRoute</h2>
            <nav>
                <a href="#" class="nav-link active"><i class="fa-solid fa-train"></i> Train Management</a>
                <a href="#" class="nav-link"><i class="fa-solid fa-route"></i> Define Routes</a>
                <a href="#" class="nav-link"><i class="fa-solid fa-calendar-days"></i> Manage Schedules</a>
                <a href="#" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Generate Reports</a>
                <a href="index.html" class="nav-link" style="margin-top: 50px; color: #f87171;"><i class="fa-solid fa-power-off"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header-flex">
                <h1>Infrastructure Governance</h1>
                <div class="stat-box" style="padding: 10px 20px;">
                    <i class="fa-solid fa-user-shield"></i> Chief Administrator
                </div>
            </div>

            <div class="glass-card">
                <h3><i class="fa-solid fa-plus-circle"></i> Add New Train</h3>
                <div class="form-row">
                    <input type="text" id="tName" placeholder="Enter Train Name">
                    <input type="number" id="tCap" placeholder="Seating Capacity">
                    <button class="btn-authorize" onclick="addTrain()" style="width: auto; padding: 12px 30px;">Add Asset</button>
                </div>

                <table class="data-table" id="trainTable">
                    <thead>
                        <tr>
                            <th>Train ID</th>
                            <th>Model/Name</th>
                            <th>Capacity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#TR-2026</td>
                            <td>Bullet Express</td>
                            <td>450 Seats</td>
                            <td><span style="color: #10b981;">● Active</span></td>
                            <td><button class="btn-del" onclick="this.parentElement.parentElement.remove()">Delete</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="stats-row">
                <div class="stat-box">
                    <h4 style="color: #64748b; margin: 0;">Route Efficiency</h4>
                    <p style="font-size: 24px; font-weight: bold; color: #1e40af;">94%</p>
                </div>
                <div class="stat-box">
                    <h4 style="color: #64748b; margin: 0;">Daily Trips</h4>
                    <p style="font-size: 24px; font-weight: bold; color: #1e40af;">48</p>
                </div>
                <div class="stat-box" style="background: #1e40af;">
                    <button style="background: none; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; height: 100%;"><i class="fa-solid fa-download"></i> FULL REPORT</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Interactive Logic for Add Train 
        function addTrain() {
            let name = document.getElementById('tName').value;
            let cap = document.getElementById('tCap').value;
            if(!name || !cap) return alert("Please enter train details.");

            let table = document.getElementById('trainTable').getElementsByTagName('tbody')[0];
            let row = table.insertRow();
            let id = "#TR-" + Math.floor(Math.random() * 9000 + 1000);

            row.innerHTML = `
                <td>${id}</td>
                <td>${name}</td>
                <td>${cap} Seats</td>
                <td><span style="color: #10b981;">● Active</span></td>
                <td><button class="btn-del" onclick="this.parentElement.parentElement.remove()">Delete</button></td>
            `;
            
            // Clear inputs [cite: 8]
            document.getElementById('tName').value = "";
            document.getElementById('tCap').value = "";
        }
    </script>
</body>
</html>
