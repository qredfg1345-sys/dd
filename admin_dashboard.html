<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailRoute Central | Admin Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>

    <div class="admin-container" style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; padding: 20px;">
        <div class="login-card" style="max-width: 900px; width: 95%;">
            <div class="brand-header">
                <div class="brand-logo"><i class="fa-solid fa-user-gear"></i></div>
                <h1>Admin Control Panel</h1>
                <p class="system-subtitle">Logged in: Infrastructure Administrator</p>
            </div>

            <div class="admin-section" style="text-align: left; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
                <h3><i class="fa-solid fa-train"></i> Train Management</h3>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-authorize" style="padding: 10px;">Add Train</button>
                    <button class="btn-authorize" style="padding: 10px; background: var(--blue-tech);">Update/Delete</button>
                </div>
            </div>

            <div class="admin-section" style="text-align: left; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
                <h3><i class="fa-solid fa-route"></i> Route Definition</h3>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-authorize" style="padding: 10px;">Define New Route</button>
                    <button class="btn-authorize" style="padding: 10px; background: var(--blue-tech);">View Routes</button>
                </div>
            </div>

            <div class="admin-section" style="text-align: left; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
                <h3><i class="fa-solid fa-calendar-days"></i> Schedule Management</h3>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-authorize" style="padding: 10px;">Create Schedule</button>
                    <button class="btn-authorize" style="padding: 10px; background: var(--blue-tech);">Check Conflicts</button>
                </div>
            </div>

            <div class="admin-section" style="text-align: left; margin-bottom: 30px;">
                <h3><i class="fa-solid fa-chart-bar"></i> Operational Reports</h3>
                <button class="btn-authorize" style="padding: 10px; width: auto;">Generate System Report</button>
            </div>

            <hr>
            <button onclick="window.location.href='index.html'" class="btn-authorize" style="background: var(--navy-deep); margin-top: 20px;">Secure Logout</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
