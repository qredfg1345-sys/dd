<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Interactive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>
    <div class="admin-wrapper">
        <aside class="sidebar">
            <h2>RailRoute Admin</h2>
            <hr>
            <p>Admin Operations:</p>
            <button onclick="window.location.href='index.html'" style="color:red; background:none; border:1px solid red; padding:10px; cursor:pointer;">Logout</button>
        </aside>

        <main class="main-content">
            <h1>Infrastructure Governance</h1>
            
            <div style="background:white; padding:20px; border-radius:15px; margin-bottom:20px;">
                <h3>Add New Train</h3>
                <input type="text" id="tName" placeholder="Train Name" style="width:30%;">
                <input type="number" id="tCap" placeholder="Capacity" style="width:30%;">
                <button onclick="addTrain()" class="btn-authorize" style="width:20%; padding:10px;">Add</button>
            </div>

            <table id="trainTable" style="width:100%; background:white; border-radius:10px; border-collapse:collapse;">
                <tr style="background:#eee;">
                    <th style="padding:10px;">Name</th>
                    <th style="padding:10px;">Capacity</th>
                    <th style="padding:10px;">Actions</th>
                </tr>
                <tr>
                    <td style="padding:10px;">Bullet-X1</td>
                    <td style="padding:10px;">400 Seats</td>
                    <td style="padding:10px;"><button style="color:red;" onclick="this.parentElement.parentElement.remove()">Delete</button></td>
                </tr>
            </table>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Interactive Function for Use Case: Add Train [cite: 3]
        function addTrain() {
            let name = document.getElementById('tName').value;
            let cap = document.getElementById('tCap').value;
            if(!name || !cap) return alert("Fill fields!");
            
            let table = document.getElementById('trainTable');
            let row = table.insertRow(-1);
            row.innerHTML = `<td style="padding:10px;">${name}</td><td style="padding:10px;">${cap} Seats</td><td style="padding:10px;"><button style="color:red;" onclick="this.parentElement.parentElement.remove()">Delete</button></td>`;
            document.getElementById('tName').value = "";
            document.getElementById('tCap').value = "";
        }
    </script>
</body>
</html>
